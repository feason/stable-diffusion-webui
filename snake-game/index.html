<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>贪吃蛇 Snake</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="container">
      <header class="header">
        <h1 class="title">贪吃蛇</h1>
        <div class="hud">
          <div class="hud-item">分数 <span id="score">0</span></div>
          <div class="hud-item">最高 <span id="highScore">0</span></div>
          <div class="hud-item">速度
            <select id="speedSelect" aria-label="选择速度">
              <option value="150">慢</option>
              <option value="120" selected>中</option>
              <option value="90">快</option>
              <option value="60">超快</option>
            </select>
          </div>
        </div>
      </header>

      <section class="game-wrap">
        <canvas id="game" width="480" height="480" aria-label="贪吃蛇画布" role="img"></canvas>

        <div id="overlay" class="overlay hidden" role="dialog" aria-modal="true">
          <div class="overlay-content">
            <h2 id="overlayTitle">开始游戏</h2>
            <p id="overlayDesc">按空格开始，方向键或 WASD 控制。手机可用下方按钮。</p>
            <div class="overlay-actions">
              <button id="startBtn" class="btn primary">开始</button>
              <button id="restartBtn" class="btn">重开</button>
            </div>
          </div>
        </div>
      </section>

      <section class="controls">
        <button id="pauseBtn" class="btn">暂停</button>
        <div class="dpad" aria-label="方向控制">
          <button class="pad pad-up" data-dir="up">▲</button>
          <div class="pad-middle">
            <button class="pad pad-left" data-dir="left">◀</button>
            <button class="pad pad-right" data-dir="right">▶</button>
          </div>
          <button class="pad pad-down" data-dir="down">▼</button>
        </div>
      </section>

      <footer class="footer">
        <p>空格开始/暂停 · R 重开 · 方向键/WASD 控制</p>
      </footer>
    </main>

    <script type="module" src="script.js"></script>
  </body>
</html>
